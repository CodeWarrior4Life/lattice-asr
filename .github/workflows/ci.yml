name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      perf_gate:
        description: "Which perf gate(s) to run on self-hosted runners (default: none — only lint + r_tier)"
        required: false
        default: "none"
        type: choice
        options:
          - "none"
          - "all"
          - "c1"
          - "c2"
          - "c3"
  schedule:
    # Weekly perf-gate run: Sundays at 07:00 UTC (= 03:00 ET).
    # Cron triggers run the workflow with default inputs (perf_gate=none),
    # so the schedule job below explicitly elevates to "all" via env override.
    - cron: "0 7 * * 0"

# Cancel duplicate lint/r_tier runs on PR updates. Perf jobs use a separate
# concurrency group below so they never compete with each other across runs
# (Switch can only execute one C1/C3 at a time without thrashing live Nexus).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # --------------------------------------------------------------------------
  # Lint — github-hosted, fast
  # --------------------------------------------------------------------------
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Install dev deps
        run: pip install -e ".[dev]" --quiet

      - name: ruff format --check
        run: ruff format --check .

      # Pre-existing 40 lint findings (mostly I001/E501/SIM117 + 2 F821 false-
      # positives on lazy-loaded WhisperModel forward refs). Surfaced but non-
      # blocking until a dedicated cleanup pass lands — keeps W6.2 ship green
      # without conflating CI bringup with lint backfill.
      - name: ruff check (non-blocking baseline)
        continue-on-error: true
        run: ruff check .

  # --------------------------------------------------------------------------
  # r_tier regression suite — github-hosted matrix (Linux + macOS, 3.11/3.12)
  # CPU-only deps (whisper + dev). No parakeet/nvidia extras since hosted
  # runners lack the hardware. r_tier marker is selected explicitly; hardware-
  # gated and perf-gated tests stay skipped here.
  # --------------------------------------------------------------------------
  r_tier:
    name: r_tier (${{ matrix.os }} / py${{ matrix.python }})
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python: ["3.11", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Install CPU deps
        # `server` extra is required because tests/test_server.py imports
        # fastapi.testclient at module load — without it, collection errors
        # before any markers can deselect the file.
        run: pip install -e ".[whisper,server,dev]" --quiet

      - name: pytest r_tier (mock-only, with coverage)
        # Uses .coveragerc.ci which omits hardware-gated engine modules
        # (parakeet-mlx, parakeet-tdt) that can't be imported on a CPU-only
        # hosted runner. The self-hosted perf jobs exercise those modules.
        run: |
          pytest tests/ \
            -m "r_tier or not (s_tier or e_tier or perf or apple_silicon or nvidia_cuda)" \
            -v \
            --cov \
            --cov-config=.coveragerc.ci \
            --cov-report=term \
            --cov-report=xml

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.os }}-py${{ matrix.python }}
          path: coverage.xml
          if-no-files-found: ignore
          retention-days: 14

  # --------------------------------------------------------------------------
  # Perf gates — self-hosted runners only. NEVER run on every push.
  # Triggers: workflow_dispatch with perf_gate input, OR weekly schedule.
  # Concurrency group "perf-gate" serialised across all three jobs so Switch
  # (host of C1 + C3) never doubles up on itself or competes with Nexus.
  # --------------------------------------------------------------------------

  c1_perf:
    name: C1 perf — Apple Silicon parakeet-mlx >10× RTF
    needs: lint
    if: >-
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.perf_gate == 'all' || github.event.inputs.perf_gate == 'c1'))
      || github.event_name == 'schedule'
    runs-on: [self-hosted, macos, arm64]
    concurrency:
      group: perf-gate-switch
      cancel-in-progress: false
    timeout-minutes: 30
    env:
      LATTICE_ASR_PERF_RUN: "1"
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Use system python3.12 (arm64 mac, brew/uv-managed)
        run: |
          python3.12 --version
          python3.12 -m venv .venv
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"

      - name: Install parakeet+whisper deps
        run: |
          python -m pip install --upgrade pip --quiet
          pip install -e ".[parakeet,whisper,dev]" --quiet

      - name: Run C1 perf gate
        run: |
          set -o pipefail
          pytest tests/perf/test_perf_gates.py::test_c1_apple_silicon_parakeet_mlx_10x_rtf \
            -v -s | tee c1_perf.log

      - name: Echo measured RTF
        if: always()
        run: grep -E '^\[C1\] RTF=' c1_perf.log || echo "no RTF line captured"

      - name: Upload C1 log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: c1-perf-log-${{ github.run_id }}
          path: c1_perf.log
          if-no-files-found: ignore
          retention-days: 30

  c2_perf:
    name: C2 perf — NVIDIA parakeet-tdt >50× RTF
    needs: lint
    if: >-
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.perf_gate == 'all' || github.event.inputs.perf_gate == 'c2'))
      || github.event_name == 'schedule'
    runs-on: [self-hosted, linux, x64, gpu, nvidia]
    concurrency:
      group: perf-gate-cypher
      cancel-in-progress: false
    timeout-minutes: 45
    env:
      LATTICE_ASR_PERF_RUN: "1"
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Use system python3.12 (Cypher)
        run: |
          python3.12 --version
          python3.12 -m venv .venv
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"

      - name: Install nvidia+whisper deps
        run: |
          python -m pip install --upgrade pip --quiet
          pip install -e ".[whisper,nvidia,dev]" --quiet

      - name: Run C2 perf gate
        run: |
          set -o pipefail
          pytest tests/perf/test_perf_gates.py::test_c2_nvidia_parakeet_tdt_50x_rtf \
            -v -s | tee c2_perf.log

      - name: Echo measured RTF
        if: always()
        run: grep -E '^\[C2\] RTF=' c2_perf.log || echo "no RTF line captured"

      - name: Upload C2 log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: c2-perf-log-${{ github.run_id }}
          path: c2_perf.log
          if-no-files-found: ignore
          retention-days: 30

  c3_perf:
    name: C3 perf — CPU distil-large-v3 int8 >2× RTF
    needs: lint
    if: >-
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.perf_gate == 'all' || github.event.inputs.perf_gate == 'c3'))
      || github.event_name == 'schedule'
    # Switch is canonical C3 host per S41 vault note (3.35× warm / 3.28× cold).
    runs-on: [self-hosted, macos, arm64]
    concurrency:
      group: perf-gate-switch
      cancel-in-progress: false
    timeout-minutes: 30
    env:
      LATTICE_ASR_PERF_RUN: "1"
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Use system python3.12 (arm64 mac)
        run: |
          python3.12 --version
          python3.12 -m venv .venv
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"

      - name: Install whisper+dev deps (CPU only)
        run: |
          python -m pip install --upgrade pip --quiet
          pip install -e ".[whisper,dev]" --quiet

      - name: Run C3 perf gate
        run: |
          set -o pipefail
          pytest tests/perf/test_perf_gates.py::test_c3_cpu_distil_2x_rtf \
            -v -s | tee c3_perf.log

      - name: Echo measured RTF
        if: always()
        run: grep -E '^\[C3\] RTF=' c3_perf.log || echo "no RTF line captured"

      - name: Upload C3 log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: c3-perf-log-${{ github.run_id }}
          path: c3_perf.log
          if-no-files-found: ignore
          retention-days: 30
